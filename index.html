<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Caderno de Viagem</title>
<meta name="theme-color" content="#F7F7F4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Caderno">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --paper:#F7F7F4;
    --card:#FFFFFF;
    --ink:#23262B;
    --ink-soft:#6B6F76;
    --ink-faint:#9A9DA3;
    --rule:#E6E6DF;
    --rule-soft:#EFEFEA;
    --accent:#33526E;      /* azul de caneta-tinteiro */
    --accent-soft:#EAF0F5;
    --seal:#B4472E;        /* carimbo vermelho, uso mínimo */
    --danger:#B4472E;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono","JetBrains Mono","IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
    --r:8px;
    --pad:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{max-width:660px;margin:0 auto;min-height:100vh;position:relative}

  /* ---------- Cabeçalho ---------- */
  header{
    position:sticky;top:0;z-index:30;background:var(--paper);
    padding:calc(env(safe-area-inset-top) + 12px) var(--pad) 0;
    border-bottom:1px solid var(--rule);
  }
  .brand{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .wordmark{display:flex;align-items:center;gap:9px}
  .seal{width:22px;height:22px;background:var(--seal);border-radius:3px;flex:0 0 auto;
    display:grid;place-items:center;color:#fff;font-family:var(--serif);font-size:12px;font-weight:700}
  .wordmark h1{font-family:var(--serif);font-size:18px;font-weight:600;margin:0;letter-spacing:.2px}
  .icon-btn{appearance:none;border:1px solid var(--rule);background:var(--card);color:var(--ink);
    width:38px;height:38px;border-radius:var(--r);display:grid;place-items:center;cursor:pointer}
  .icon-btn:hover{border-color:var(--accent)}
  .icon-btn svg{width:19px;height:19px}

  /* linha da viagem atual */
  .tripbar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:10px 0 12px}
  .tripbar .name{font-family:var(--serif);font-size:15px;color:var(--ink);cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:0}
  .tripbar .name svg{width:14px;height:14px;opacity:.5}
  .tripbar .total{font-family:var(--mono);font-size:13px;color:var(--ink-soft);white-space:nowrap}
  .tripbar .total b{color:var(--ink);font-weight:600}

  /* ---------- Abas ---------- */
  nav.tabs{position:sticky;top:var(--header-h,92px);z-index:20;display:flex;gap:0;background:var(--paper);
    border-bottom:1px solid var(--rule);padding:0 var(--pad)}
  nav.tabs button{flex:1;appearance:none;background:none;border:none;cursor:pointer;
    padding:13px 4px;font-family:var(--sans);font-size:13.5px;color:var(--ink-soft);
    border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.2px}
  nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

  /* ---------- Conteúdo ---------- */
  main{padding:8px var(--pad) 96px}

  .daylabel{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--ink-faint);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--rule-soft)}
  .daylabel:first-child{margin-top:8px}

  /* linha/cartão estilo caderno */
  .row{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--rule-soft);cursor:pointer}
  .row:hover{background:var(--rule-soft)}
  .row.is-past{opacity:.62}
  .row.is-past .gutter,.row.is-past .body,.row.is-past .price{text-decoration:line-through}
  .gutter{flex:0 0 52px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--accent);
    padding-top:2px;line-height:1.35}
  .gutter .sub{color:var(--ink-faint)}
  .body{flex:1;min-width:0}
  .body .title{font-size:15px;font-weight:600;color:var(--ink);margin:0 0 3px;display:flex;align-items:center;gap:7px}
  .body .meta{font-size:13px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:4px 12px}
  .body .meta .mono{font-family:var(--mono);font-size:12.5px}
  .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;
    color:var(--ink-soft);border:1px solid var(--rule);border-radius:4px;padding:1px 6px}
  .tag.plat{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-soft)}
  .price{flex:0 0 auto;font-family:var(--mono);font-size:13px;color:var(--ink);text-align:right;padding-top:2px}
  .price .sub{font-size:11px;color:var(--ink-faint);margin-top:2px}
  .clip{display:inline-flex;align-items:center;gap:3px;color:var(--accent);font-size:12px}
  .map-link{color:var(--accent);text-decoration:none;font-weight:600}
  .map-link:hover{text-decoration:underline}
  .dur-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);border:1px solid var(--rule);border-radius:999px;padding:2px 7px}
  .summary-card{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:16px 16px 12px;margin:12px 0 0}
  .summary-card h3{font-family:var(--serif);font-size:17px;margin:0 0 8px}
  .summary-card p{margin:0 0 10px;color:var(--ink-soft);font-size:13px}
  .summary-list{display:grid;gap:8px}
  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--rule-soft)}
  .summary-row:first-child{border-top:none;padding-top:0}
  .summary-row .label{font-size:14px;color:var(--ink)}
  .summary-row .amount{font-family:var(--mono);font-size:13px;color:var(--ink)}
  .summary-total{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:8px;border-top:1px solid var(--rule);font-weight:600}
  .summary-total .amount{font-family:var(--mono)}
  .clip{display:inline-flex;align-items:center;gap:3px;color:var(--accent);font-size:12px}
  .clip svg{width:13px;height:13px}

  /* estado vazio */
  .empty{text-align:center;padding:64px 20px;color:var(--ink-soft)}
  .empty .mk{width:44px;height:44px;margin:0 auto 14px;color:var(--ink-faint)}
  .empty h3{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--ink);margin:0 0 6px}
  .empty p{margin:0 auto;max-width:280px;font-size:14px}

  /* botão flutuante + */
  .fab{position:fixed;z-index:40;right:calc(50% - 330px + 20px);bottom:24px;
    width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;
    box-shadow:0 6px 18px rgba(51,82,110,.32);cursor:pointer;display:grid;place-items:center}
  .fab svg{width:26px;height:26px}
  @media(max-width:700px){.fab{right:20px}}

  /* ---------- Modal / folha ---------- */
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(35,38,43,.34);
    display:flex;align-items:flex-end;justify-content:center;padding:0}
  .sheet{background:var(--paper);width:100%;max-width:660px;max-height:92vh;overflow:auto;
    border-radius:16px 16px 0 0;padding:8px var(--pad) calc(24px + env(safe-area-inset-bottom));
    animation:up .22s ease}
  @keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
  @media(min-width:700px){.scrim{align-items:center;padding:20px}.sheet{border-radius:16px}}
  .sheet-grip{width:38px;height:4px;background:var(--rule);border-radius:2px;margin:6px auto 10px}
  .sheet h2{font-family:var(--serif);font-weight:600;font-size:19px;margin:2px 0 16px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;letter-spacing:.3px;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field select,.field textarea{
    width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--card);
    border:1px solid var(--rule);border-radius:var(--r);padding:11px 12px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:64px}
  .field .mono-in{font-family:var(--mono)}
  .field .check-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink)}
  .field .check-row input{width:auto;margin:0}
  .time-picker{position:relative}
  .time-picker-pill{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--card);
    border:1px solid var(--rule);border-radius:var(--r);padding:11px 12px;outline:none;text-align:left;cursor:pointer}
  .time-picker-pill:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .time-picker-panel{position:absolute;left:0;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:10px;box-shadow:0 10px 24px rgba(35,38,43,.16);z-index:6}
  .time-picker-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .time-picker-label{font-size:12px;letter-spacing:.3px;color:var(--ink-soft);font-weight:600}
  .time-picker-dial{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;max-height:240px;overflow:auto;padding:4px}
  .time-picker-btn{aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--rule);border-radius:50%;background:var(--card);font-family:var(--mono);font-size:13px;color:var(--ink);cursor:pointer}
  .time-picker-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .file-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .file-cur{font-family:var(--mono);font-size:12px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px}
  .btn{appearance:none;border:1px solid var(--rule);background:var(--card);color:var(--ink);
    font-family:var(--sans);font-size:14px;padding:10px 14px;border-radius:var(--r);cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.sm{padding:7px 10px;font-size:13px}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:#2b465e}
  .btn.ghost{border-color:transparent;background:none}
  .btn.danger{color:var(--danger);border-color:transparent;background:none}
  .sheet-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center;margin-top:18px;
    padding-top:16px;border-top:1px solid var(--rule)}
  .sheet-actions .spacer{flex:1}

  /* detalhe */
  .dl{margin:0}
  .dl div{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--rule-soft)}
  .dl dt{flex:0 0 108px;font-size:12px;color:var(--ink-soft);letter-spacing:.3px;padding-top:1px}
  .dl dd{margin:0;flex:1;font-size:14.5px;color:var(--ink)}
  .dl dd.mono{font-family:var(--mono);font-size:13.5px}
  .dl a{color:var(--accent);text-decoration:none}
  .dl a:hover{text-decoration:underline}
  .link-btn{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;
    text-decoration:none;border:1px solid var(--accent-soft);background:var(--accent-soft);
    padding:8px 12px;border-radius:var(--r);margin:2px 8px 2px 0}
  .link-btn svg{width:15px;height:15px}

  /* menu */
  .menu{position:fixed;z-index:60;top:0;right:0;left:0;bottom:0;display:flex;
    align-items:flex-start;justify-content:flex-end;padding:calc(env(safe-area-inset-top) + 58px) 14px}
  .menu-card{background:var(--card);border:1px solid var(--rule);border-radius:12px;
    box-shadow:0 12px 30px rgba(35,38,43,.16);min-width:230px;overflow:hidden}
  .menu-card button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    background:none;border:none;padding:13px 16px;font-family:var(--sans);font-size:14.5px;
    color:var(--ink);cursor:pointer;border-bottom:1px solid var(--rule-soft)}
  .menu-card button:last-child{border-bottom:none}
  .menu-card button:hover{background:var(--rule-soft)}
  .menu-card button svg{width:17px;height:17px;color:var(--ink-soft);flex:0 0 auto}
  .menu-card .sec{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-faint);
    padding:10px 16px 4px}

  /* visualizador de anexo */
  .viewer{position:fixed;inset:0;z-index:70;background:#1b1d20;display:flex;flex-direction:column}
  .viewer-bar{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;color:#fff}
  .viewer-bar .fn{flex:1;font-family:var(--mono);font-size:13px;color:#dcdcda;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .viewer-bar a,.viewer-bar button{color:#fff;background:rgba(255,255,255,.12);border:none;
    padding:8px 12px;border-radius:8px;font-size:13px;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .viewer-body{flex:1;overflow:auto;display:grid;place-items:center}
  .viewer-body iframe{width:100%;height:100%;border:none;background:#fff}
  .viewer-body img{max-width:100%;max-height:100%;object-fit:contain}

  .hint{font-size:12.5px;color:var(--ink-faint);margin-top:-6px;margin-bottom:12px}
  .toast{position:fixed;z-index:90;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:13.5px;padding:11px 16px;border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.24);opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="wordmark"><div class="seal">わ</div><h1>Caderno de Viagem</h1></div>
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
      </button>
    </div>
    <div class="tripbar">
      <button class="name" id="tripName">
        <span id="tripNameText">Minha viagem</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="total" id="tripTotal"></div>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="acomodacoes" class="active">Alojamento</button>
    <button data-tab="deslocamentos">Deslocamentos</button>
    <button data-tab="atracoes">Atrações</button>
    <button data-tab="resumo">Resumo</button>
  </nav>

  <main id="main"></main>

  <button class="fab" id="fab" aria-label="Adicionar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================================
   Caderno de Viagem — app offline de organização de viagens
   Dados: localStorage (texto)  |  Anexos PDF/imagem: IndexedDB (binário)
   ========================================================================= */

/* ---------- utilidades ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc = s => (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function setHeaderH(){const h=$('header');if(h)document.documentElement.style.setProperty('--header-h',h.offsetHeight+'px');}
function lockScroll(on){document.body.style.overflow=on?'hidden':'';}
window.addEventListener('resize',setHeaderH);

const CURRENCIES = ['EUR','BRL','USD','GBP','CHF'];
function money(n,cur){
  const v = Number(n)||0;
  try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:cur||'EUR'}).format(v);}
  catch(e){return (cur||'EUR')+' '+v.toFixed(2);}
}
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  return new Intl.DateTimeFormat('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).format(d).replace('.','');
}
function fmtDateFull(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  return new Intl.DateTimeFormat('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).format(d);
}
function mapsSearch(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}
function mapsDir(a,b){return 'https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(a||'')+'&destination='+encodeURIComponent(b||'');}
function compareDateTime(date,time){
  if(!date) return null;
  const dt = new Date(`${date}T${time||'00:00'}`);
  return isNaN(dt) ? null : dt;
}
function isPastItem(kind,x){
  const now=new Date();
  if(kind==='acomodacoes'){
    const dt = compareDateTime(x.checkoutDate || x.checkinDate, x.checkoutTime || x.checkinTime || '23:59');
    return !!dt && dt < now;
  }
  if(kind==='deslocamentos'){
    const dt = compareDateTime(x.departDate, x.departTime || '00:00');
    return !!dt && dt < now;
  }
  if(kind==='atracoes'){
    const dt = compareDateTime(x.date, x.time || '23:59');
    return !!dt && dt < now;
  }
  return false;
}
function sortByRecency(kind,list){
  return list.slice().sort((a,b)=>{
    const ap=isPastItem(kind,a), bp=isPastItem(kind,b);
    if(ap!==bp) return ap ? 1 : -1;
    const ka = kind==='acomodacoes' ? `${a.checkoutDate || a.checkinDate || ''}|${a.checkoutTime || a.checkinTime || '23:59'}`
      : kind==='deslocamentos' ? `${a.departDate || ''}|${a.departTime || '00:00'}`
      : `${a.date || ''}|${a.time || '23:59'}`;
    const kb = kind==='acomodacoes' ? `${b.checkoutDate || b.checkinDate || ''}|${b.checkoutTime || b.checkinTime || '23:59'}`
      : kind==='deslocamentos' ? `${b.departDate || ''}|${b.departTime || '00:00'}`
      : `${b.date || ''}|${b.time || '23:59'}`;
    return ka.localeCompare(kb);
  });
}
function mapLinkFor(kind,x){
  if(kind==='deslocamentos'){
    if(x.from||x.to) return mapsDir(x.from,x.to);
    return '';
  }
  if(x.location) return mapsSearch(x.location);
  return '';
}
const DB_NAME='cadernoViagem', STORE='anexos';
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,1);
  r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE))r.result.createObjectStore(STORE);};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}
async function putAnexo(id,rec){const db=await openDB();return new Promise((res,rej)=>{
  const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(rec,id);
  tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function getAnexo(id){const db=await openDB();return new Promise((res,rej)=>{
  const tx=db.transaction(STORE,'readonly');const g=tx.objectStore(STORE).get(id);
  g.onsuccess=()=>res(g.result);g.onerror=()=>rej(g.error);});}
async function delAnexo(id){if(!id)return;const db=await openDB();return new Promise((res,rej)=>{
  const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);
  tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function allAnexos(){const db=await openDB();return new Promise((res,rej)=>{
  const tx=db.transaction(STORE,'readonly');const st=tx.objectStore(STORE);
  const keys=st.getAllKeys(),vals=st.getAll();let k,v;
  keys.onsuccess=()=>{k=keys.result;if(v)res(k.map((id,i)=>[id,v[i]]));};
  vals.onsuccess=()=>{v=vals.result;if(k)res(k.map((id,i)=>[id,v[i]]));};
  tx.onerror=()=>rej(tx.error);});}
function blobToDataURL(b){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(b);});}
async function dataURLToBlob(u){return await (await fetch(u)).blob();}

const LS='cadernoViagem.v1';
let state = load();
function load(){
  try{const s=JSON.parse(localStorage.getItem(LS));if(s&&s.trips)return s;}catch(e){}
  const t={id:uid(),name:'Minha viagem',currency:'EUR'};
  return {trips:[t],currentTripId:t.id,acomodacoes:[],deslocamentos:[],atracoes:[]};
}
function save(){localStorage.setItem(LS,JSON.stringify(state));}
function trip(){return state.trips.find(t=>t.id===state.currentTripId)||state.trips[0];}
function items(kind){return state[kind].filter(x=>x.tripId===state.currentTripId);}

let activeTab='acomodacoes';

   ========================================================================= */
function itemCost(kind,x){
  if(kind==='acomodacoes'){
    const guests=Math.max(1,Number(x.guests)||1);
    return (Number(x.cost)||0)/guests;
  }
  return Number(x.cost)||0;
}
function sectionTotal(kind){
  return items(kind).reduce((s,x)=>s+itemCost(kind,x),0);
}
function render(){
  $('#tripNameText').textContent = trip().name;
  const cur = trip().currency;
  const sum = ['acomodacoes','deslocamentos','atracoes'].reduce((a,k)=>a+sectionTotal(k),0);
  $('#tripTotal').innerHTML = 'total <b>'+esc(money(sum,cur))+'</b>';
  [...$('#tabs').children].forEach(b=>b.classList.toggle('active',b.dataset.tab===activeTab));
  const m=$('#main');
  if(activeTab==='acomodacoes') m.innerHTML=renderAcomodacoes();
  else if(activeTab==='deslocamentos') m.innerHTML=renderDeslocamentos();
  else if(activeTab==='resumo') m.innerHTML=renderResumo();

/* ---- Deslocamentos ---- */
const TRANS_ICON={Voo:'✈',Trem:'🚆',Ônibus:'🚌',Ferry:'⛴',Carro:'🚗',Metrô:'🚇',Outro:'•'};
function travelDur(d){
  if(!d.departTime||!d.arriveTime)return '';
  const [dh,dm]=d.departTime.split(':').map(Number);
  const [ah,am]=d.arriveTime.split(':').map(Number);
  let mins=(ah*60+am)-(dh*60+dm);
  if(mins<=0)mins+=24*60;
  const h=Math.floor(mins/60),m=mins%60;
  return h?(m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`):`${m}min`;
}
function renderDeslocamentos(){
  const list=sortByRecency('deslocamentos', items('deslocamentos'));
  if(!list.length) return emptyState(ICO.route,'Nenhum deslocamento ainda',
    'Voos, trens, ônibus ou ferries — registre partida, chegada, companhia e valor. Toque em +.');
  const cur=trip().currency;
  // agrupado por data
  const groups={};
  list.forEach(d=>{const k=d.departDate||'';(groups[k]=groups[k]||[]).push(d);});
  return Object.keys(groups).sort((a,b)=>(a||'~').localeCompare(b||'~')).map(date=>{
    const head=`<div class="daylabel">${date?fmtDateFull(date):'Sem data marcada'}</div>`;
    const rows=groups[date].map(d=>{
      const clip=d.attachmentId?`<span class="clip">${ICO.clip}</span>`:'';
      const dur=travelDur(d);
      const isPast=isPastItem('deslocamentos',d)?' is-past':'';
      const routeHref=mapLinkFor('deslocamentos',d);
      const routeLabel=routeHref?`<a class="map-link" href="${routeHref}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(d.from||'?')} → ${esc(d.to||'?')}</a>`:`${esc(d.from||'?')} → ${esc(d.to||'?')}`;
      return `<div class="row${isPast}" data-open="deslocamentos:${d.id}">
        <div class="gutter">${esc(d.departTime||'—')}${d.arriveTime?`<div class="sub">${esc(d.arriveTime)}</div>`:''}</div>
        <div class="body">
          <div class="title">${TRANS_ICON[d.type]||'•'}${dur?` <span class="dur-badge">${dur}</span>`:''} ${routeLabel} ${clip}</div>
          <div class="meta">
            ${d.type?`<span class="tag">${esc(d.type)}</span>`:''}
            ${d.company?`<span>${esc(d.company)}</span>`:''}
          </div>
        </div>
        <div class="price">${d.cost?esc(money(d.cost,cur)):''}</div>
      </div>`;
    }).join('');
    return head+rows;
  }).join('');
}

let pendingFile=null;       // arquivo escolhido no formulário, ainda não salvo
let pendingRemove=false;    // marca remoção do anexo existente

function formatTimeValue(value){
  const s=String(value??'').trim();
  if(!s) return '';
  const m=s.match(/^(\d{1,2}):(\d{1,2})/);
  if(!m) return s;
  const h=String(Math.min(23,Math.max(0,Number(m[1])))).padStart(2,'0');
  const min=String(Math.min(59,Math.max(0,Number(m[2])))).padStart(2,'0');
  return `${h}:${min}`;
}
function timePickerHTML(id,value){
  const v=formatTimeValue(value);
  return `<div class="time-picker" data-time-picker="${esc(id)}">
    <input type="hidden" id="${esc(id)}" value="${esc(v)}">
    <button type="button" class="time-picker-pill" data-time-toggle>${esc(v||'--:--')}</button>
    <div class="time-picker-panel" data-time-panel hidden>
      <div class="time-picker-head">
        <button type="button" class="btn sm ghost" data-time-back>Voltar</button>
        <div class="time-picker-label" data-time-label>Horas</div>
      </div>
      <div class="time-picker-dial" data-time-dial></div>
    </div>
  </div>`;
}
function initTimePickers(){
  document.querySelectorAll('[data-time-picker]').forEach(wrapper=>{
    const id=wrapper.dataset.timePicker;
    const hidden=wrapper.querySelector('input[type="hidden"]');
    const toggle=wrapper.querySelector('[data-time-toggle]');
    const panel=wrapper.querySelector('[data-time-panel]');
    const label=wrapper.querySelector('[data-time-label]');
    const dial=wrapper.querySelector('[data-time-dial]');
    const back=wrapper.querySelector('[data-time-back]');
    let stage='hour'; let hour='00'; let minute='00';
    const parts=(hidden.value||'').split(':');
    if(parts.length===2){hour=String(Math.min(23,Math.max(0,Number(parts[0])))).padStart(2,'0');minute=String(Math.min(59,Math.max(0,Number(parts[1])))).padStart(2,'0');}
    function render(){
      if(stage==='hour'){
        label.textContent='Horas';
        const values=Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
        dial.innerHTML=values.map(v=>`<button type="button" class="time-picker-btn${v===hour?' active':''}" data-time-choice="${v}">${v}</button>`).join('');
      }else{
        label.textContent='Minutos';
        const values=Array.from({length:60},(_,i)=>String(i).padStart(2,'0'));
        dial.innerHTML=values.map(v=>`<button type="button" class="time-picker-btn${v===minute?' active':''}" data-time-choice="${v}">${v}</button>`).join('');
      }
    }
    const close=()=>{panel.hidden=true;stage='hour';};
    toggle.addEventListener('click',()=>{panel.hidden=false;stage='hour';render();});
    back.addEventListener('click',()=>stage==='minute'? (stage='hour', render()) : close());
    dial.addEventListener('click',e=>{
      const btn=e.target.closest('[data-time-choice]'); if(!btn)return;
      const choice=btn.dataset.timeChoice;
      if(stage==='hour'){hour=choice;stage='minute';render();}
      else{minute=choice;hidden.value=`${hour}:${minute}`;toggle.textContent=`${hour}:${minute}`;close();}
    });
    render();
  });
}

function wireForm(kind,obj){

    pendingFile=f; pendingRemove=false;

  });
  const rm=$('[data-rmfile]');
  if(rm) rm.addEventListener('click',()=>{pendingRemove=true;pendingFile=null;reopenForm(kind,obj);});
  const paid=$('#f_paid'); const dueWrap=$('#f_due_wrap');

  }
  initTimePickers();
  $('[data-cancel]').addEventListener('click',closeModal);
  $('[data-save]').addEventListener('click',()=>saveEntry(kind,obj));
  const del=$('[data-del]');
  if(del) del.addEventListener('click',()=>confirmDelete(kind,obj.id));
}
// reabre mantendo os valores já digitados (para atualizar só o bloco de arquivo)
function reopenForm(kind,obj){
  const snap=collect(kind); Object.assign(obj,snap);
  if(kind==='acomodacoes')formAcomodacao(obj);
  else if(kind==='deslocamentos')formDeslocamento(obj);
  else formAtracao(obj);
}

function val(id){const el=$('#'+id);return el?el.value.trim():'';}
function num(id){const v=val(id).replace(',','.');return v===''?'':(Number(v)||0);}

function collect(kind){
  if(kind==='acomodacoes') return {
    name:val('f_name'),platform:val('f_platform'),cost:num('f_cost'),location:val('f_location'),
    checkinDate:val('f_ci_d'),checkinTime:val('f_ci_t'),checkoutDate:val('f_co_d'),checkoutTime:val('f_co_t'),
    url:val('f_url'),notes:val('f_notes'),guests:Math.max(1,Number(val('f_guests'))||1),
    paid: $('#f_paid') ? $('#f_paid').checked : false, paymentDueDate: val('f_due_date')};
  if(kind==='deslocamentos') return {
    type:val('f_type'),company:val('f_company'),from:val('f_from'),to:val('f_to'),
    departDate:val('f_dep_d'),departTime:val('f_dep_t'),arriveTime:val('f_arr_t'),
    cost:num('f_cost'),notes:val('f_notes')};
  return {name:val('f_name'),location:val('f_location'),date:val('f_date'),time:val('f_time'),
    cost:num('f_cost'),url:val('f_url'),notes:val('f_notes')};
}

async function saveEntry(kind,obj){
  const data=collect(kind);
  let attachmentId=obj.attachmentId||null;
  if(pendingRemove){await delAnexo(attachmentId);attachmentId=null;}
  if(pendingFile){
    if(attachmentId)await delAnexo(attachmentId);
    attachmentId=uid();
    await putAnexo(attachmentId,{blob:pendingFile,name:pendingFile.name,type:pendingFile.type});
  }
  if(obj.id){
    const arr=state[kind];const i=arr.findIndex(x=>x.id===obj.id);
    arr[i]={...arr[i],...data,attachmentId};
  }else{
    state[kind].push({id:uid(),tripId:state.currentTripId,...data,attachmentId});
  }
  pendingFile=null;pendingRemove=false;
  save();closeModal();render();
  toast('Salvo');
}

function confirmDelete(kind,id){
  const obj=state[kind].find(x=>x.id===id);
  sheet(`<h2>Excluir?</h2>
    <p style="color:var(--ink-soft);margin:0 0 4px">Isto remove o item e o anexo em PDF junto. Não dá pra desfazer.</p>
    <div class="sheet-actions"><div class="spacer"></div>
      <button class="btn ghost" data-cancel>Cancelar</button>
      <button class="btn primary" style="background:var(--danger);border-color:var(--danger)" data-really>Excluir</button></div>`);
  $('[data-cancel]').addEventListener('click',()=>openDetailOrForm(kind,id));
  $('[data-really]').addEventListener('click',async()=>{
    if(obj&&obj.attachmentId)await delAnexo(obj.attachmentId);
    state[kind]=state[kind].filter(x=>x.id!==id);
    save();closeModal();render();toast('Excluído');
  });
}

/* ---------- Detalhe ---------- */
function openDetailOrForm(kind,id){detail(kind,id);}
function detail(kind,id){
  const x=state[kind].find(e=>e.id===id); if(!x)return;
  const cur=trip().currency;
  let rows='';
  const add=(k,v,mono)=>{if(v)rows+=`<div><dt>${k}</dt><dd class="${mono?'mono':''}">${v}</dd></div>`;};

  if(kind==='acomodacoes'){
    add('Onde comprou',esc(x.platform));
    add('Valor total',x.cost?esc(money(x.cost,cur)):'',true);
    add('Hóspedes',esc(String(Math.max(1,Number(x.guests)||1))),true);
    add('Pago',x.paid?'Sim':'Não',true);
    if(!x.paid && x.paymentDueDate) add('Vence em',fmtDate(x.paymentDueDate),true);
    add('Valor por pessoa',x.cost?esc(money(itemCost(kind,x),cur)):'',true);
    add('Local',x.location?`<a class="map-link" href="${mapsSearch(x.location)}" target="_blank" rel="noopener">${esc(x.location)}</a>`:'');
    add('Check-in',[fmtDate(x.checkinDate),x.checkinTime].filter(Boolean).join(' · '),true);
    add('Check-out',[fmtDate(x.checkoutDate),x.checkoutTime].filter(Boolean).join(' · '),true);
    add('Notas',esc(x.notes).replace(/\n/g,'<br>'));
  }else if(kind==='deslocamentos'){
    add('Tipo',esc(x.type)); add('Companhia',esc(x.company));
    add('Partida',[esc(x.from),fmtDate(x.departDate),x.departTime].filter(Boolean).join(' · '),true);
    add('Chegada',[esc(x.to),x.arriveTime].filter(Boolean).join(' · '),true);
    add('Rota',x.from||x.to?`<a class="map-link" href="${mapsDir(x.from,x.to)}" target="_blank" rel="noopener">${[x.from,x.to].filter(Boolean).join(' → ')}</a>`:'');
    add('Valor',x.cost?esc(money(x.cost,cur)):'',true);
    add('Notas',esc(x.notes).replace(/\n/g,'<br>'));
  }else{
    add('Local',x.location?`<a class="map-link" href="${mapsSearch(x.location)}" target="_blank" rel="noopener">${esc(x.location)}</a>`:'');
    add('Quando',[fmtDate(x.date),x.time].filter(Boolean).join(' · '),true);
    add('Custo',x.cost?esc(money(x.cost,cur)):'',true);
    add('Notas',esc(x.notes).replace(/\n/g,'<br>'));
  }

  // botões de link
  let links='';
  if(kind==='deslocamentos' && (x.from||x.to))
    links+=`<a class="link-btn" target="_blank" rel="noopener" href="${mapsDir(x.from,x.to)}">${ICO.map} Rota no mapa</a>`;
  else if(x.location)
    links+=`<a class="link-btn" target="_blank" rel="noopener" href="${mapsSearch(x.location)}">${ICO.map} Abrir no mapa</a>`;
  if(x.url) links+=`<a class="link-btn" target="_blank" rel="noopener" href="${esc(x.url)}">${ICO.ext} Abrir reserva/site</a>`;
  if(x.attachmentId) links+=`<button class="link-btn" data-view="${x.attachmentId}">${ICO.clip} Ver confirmação</button>`;

  const title = kind==='deslocamentos' ? `${esc(x.from||'?')} → ${esc(x.to||'?')}` : esc(x.name||'Sem nome');
  sheet(`<h2>${title}</h2>
    ${links?`<div style="margin:-4px 0 14px">${links}</div>`:''}
    <dl class="dl">${rows||'<div><dd style="color:var(--ink-faint)">Sem detalhes preenchidos.</dd></div>'}</dl>
    <div class="sheet-actions">
      <button class="btn danger" data-del2>Excluir</button>
      <div class="spacer"></div>
      <button class="btn ghost" data-cancel>Fechar</button>
      <button class="btn primary" data-edit>Editar</button>
    </div>`);
  $('[data-cancel]').addEventListener('click',closeModal);
  $('[data-edit]').addEventListener('click',()=>{pendingFile=null;pendingRemove=false;openForm(kind,x);});
  $('[data-del2]').addEventListener('click',()=>confirmDelete(kind,id));
  const vb=$('[data-view]'); if(vb)vb.addEventListener('click',()=>viewAnexo(x.attachmentId));
}

function openForm(kind,obj){
  if(kind==='acomodacoes')formAcomodacao(obj);
  else if(kind==='deslocamentos')formDeslocamento(obj);
  else formAtracao(obj);
}

/* ---------- Visualizador de anexo ---------- */
async function viewAnexo(id){
  const rec=await getAnexo(id);
  if(!rec){toast('Anexo não encontrado');return;}
  lockScroll(true);
  const url=URL.createObjectURL(rec.blob);
  const isImg=(rec.type||'').startsWith('image/');
  const body=isImg?`<img src="${url}" alt="">`:`<iframe src="${url}"></iframe>`;
  root.innerHTML=`<div class="viewer">
    <div class="viewer-bar">
      <button data-close>${ICO.ext} Fechar</button>
      <div class="fn">${esc(rec.name||'anexo')}</div>
      <a href="${url}" target="_blank" rel="noopener" download="${esc(rec.name||'anexo')}">Baixar</a>
    </div>
    <div class="viewer-body">${body}</div></div>`;
  $('[data-close]').addEventListener('click',()=>{URL.revokeObjectURL(url);closeModal();});
}

/* =========================================================================
   VIAGENS + MENU + BACKUP
   ========================================================================= */
function tripPicker(){
  const opts=state.trips.map(t=>`<button data-pick="${t.id}">${t.id===state.currentTripId?'● ':'○ '}${esc(t.name)} <span style="color:var(--ink-faint);font-family:var(--mono);font-size:12px;margin-left:auto">${esc(t.currency)}</span></button>`).join('');
  sheet(`<h2>Suas viagens</h2>
    <div class="menu-card" style="box-shadow:none;margin-bottom:14px">${opts}</div>
    <div class="sheet-actions">
      <button class="btn danger" data-deltrip ${state.trips.length<2?'style="display:none"':''}>Excluir esta viagem</button>
      <div class="spacer"></div>
      <button class="btn" data-rename>Renomear</button>
      <button class="btn primary" data-new>Nova viagem</button>
    </div>`);
  root.querySelectorAll('[data-pick]').forEach(b=>b.addEventListener('click',()=>{
    state.currentTripId=b.dataset.pick;save();closeModal();render();
  }));
  $('[data-new]').addEventListener('click',tripForm);
  $('[data-rename]').addEventListener('click',()=>tripForm(trip()));
  const dt=$('[data-deltrip]'); if(dt)dt.addEventListener('click',deleteTrip);
}
function tripForm(t){
  t=t||{};
  sheet(`<h2>${t.id?'Renomear viagem':'Nova viagem'}</h2>
    <div class="field"><label>Nome</label><input id="t_name" value="${esc(t.name)}" placeholder="Ex.: Itália + Provença 2026"></div>
    <div class="field"><label>Moeda principal</label>
      <select id="t_cur">${CURRENCIES.map(c=>`<option ${((t.currency||'EUR')===c)?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="sheet-actions"><div class="spacer"></div>
      <button class="btn ghost" data-cancel>Cancelar</button>
      <button class="btn primary" data-savetrip>Salvar</button></div>`);
  $('[data-cancel]').addEventListener('click',tripPicker);
  $('[data-savetrip]').addEventListener('click',()=>{
    const name=val('t_name')||'Viagem';const currency=val('t_cur')||'EUR';
    if(t.id){const o=state.trips.find(x=>x.id===t.id);o.name=name;o.currency=currency;}
    else{const nt={id:uid(),name,currency};state.trips.push(nt);state.currentTripId=nt.id;}
    save();closeModal();render();
  });
}
function deleteTrip(){
  sheet(`<h2>Excluir viagem?</h2>
    <p style="color:var(--ink-soft);margin:0 0 4px">Remove a viagem "<b>${esc(trip().name)}</b>" e todos os alojamentos, deslocamentos, atrações e anexos dela.</p>
    <div class="sheet-actions"><div class="spacer"></div>
      <button class="btn ghost" data-cancel>Cancelar</button>
      <button class="btn primary" style="background:var(--danger);border-color:var(--danger)" data-really>Excluir tudo</button></div>`);
  $('[data-cancel]').addEventListener('click',tripPicker);
  $('[data-really]').addEventListener('click',async()=>{
    const id=state.currentTripId;
    for(const k of ['acomodacoes','deslocamentos','atracoes'])
      for(const x of state[k].filter(e=>e.tripId===id)) if(x.attachmentId)await delAnexo(x.attachmentId);
    for(const k of ['acomodacoes','deslocamentos','atracoes']) state[k]=state[k].filter(e=>e.tripId!==id);
    state.trips=state.trips.filter(t=>t.id!==id);
    state.currentTripId=state.trips[0].id;
    save();closeModal();render();toast('Viagem excluída');
  });
}

/* ---------- menu ---------- */
function openMenu(){
  lockScroll(true);
  root.innerHTML=`<div class="menu" data-scrim>
    <div class="menu-card">
      <div class="sec">Dados</div>
      <button data-act="export">${ICO.ext} Exportar backup (.json)</button>
      <button data-act="import">${ICO.clip} Importar backup</button>
      <div class="sec">Sobre</div>
      <button data-act="about">${ICO.pin} Como funciona / offline</button>
    </div></div>`;
  $('[data-scrim]').addEventListener('click',e=>{if(e.target.hasAttribute('data-scrim'))closeModal();});
  $('[data-act="export"]').addEventListener('click',exportBackup);
  $('[data-act="import"]').addEventListener('click',importBackup);
  $('[data-act="about"]').addEventListener('click',about);
}

async function exportBackup(){
  toast('Preparando backup…');
  const anexos={};
  for(const [id,rec] of await allAnexos()){
    anexos[id]={name:rec.name,type:rec.type,data:await blobToDataURL(rec.blob)};
  }
  const payload={_app:'CadernoDeViagem',_v:1,exportedAt:new Date().toISOString(),state,anexos};
  const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='caderno-viagem-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);closeModal();toast('Backup salvo');
}
function importBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const p=JSON.parse(await f.text());
      if(!p.state||!p.state.trips)throw new Error('formato');
      state=p.state;save();
      if(p.anexos)for(const id in p.anexos){
        const r=p.anexos[id];await putAnexo(id,{blob:await dataURLToBlob(r.data),name:r.name,type:r.type});
      }
      closeModal();render();toast('Backup importado');
    }catch(e){toast('Arquivo inválido');}
  };
  inp.click();
}
function about(){
  sheet(`<h2>Como funciona</h2>
    <div style="font-size:14px;color:var(--ink);line-height:1.6">
      <p style="margin:.2em 0 1em"><b>Offline.</b> Depois de abrir uma vez, tudo funciona sem internet — inclusive as confirmações em PDF. Só os botões de mapa e os links precisam de conexão.</p>
      <p style="margin:0 0 1em"><b>Onde ficam seus dados.</b> Tudo é salvo <b>só neste navegador, neste aparelho</b>. Nada vai pra nuvem. Se você limpar os dados do navegador, apaga.</p>
      <p style="margin:0 0 1em"><b>Backup = sua segurança.</b> Antes de viajar, use <i>Exportar backup</i>. O arquivo <code>.json</code> leva os PDFs dentro e pode ser guardado no e-mail ou na nuvem, e importado em outro aparelho.</p>
      <p style="margin:0 0 1em"><b>Instalar no celular.</b> No navegador, use "Adicionar à tela de início" para virar um ícone de app.</p>
      <p style="margin:0;color:var(--ink-soft)">Mapas abrem no Google Maps com o endereço que você digitou.</p>
    </div>
    <div class="sheet-actions"><div class="spacer"></div><button class="btn primary" data-cancel>Entendi</button></div>`);
  $('[data-cancel]').addEventListener('click',closeModal);
}

/* =========================================================================
   EVENTOS GLOBAIS
   ========================================================================= */
$('#tabs').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;activeTab=b.dataset.tab;render();});
$('#main').addEventListener('click',e=>{const r=e.target.closest('[data-open]');if(!r)return;
  const [kind,id]=r.dataset.open.split(':');detail(kind,id);});
$('#fab').addEventListener('click',()=>{pendingFile=null;pendingRemove=false;
  if(activeTab==='acomodacoes')formAcomodacao();
  else if(activeTab==='deslocamentos')formDeslocamento();
  else formAtracao();});
$('#menuBtn').addEventListener('click',openMenu);
$('#tripName').addEventListener('click',tripPicker);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

render();
setHeaderH();

/* service worker: só ativa quando servido por http(s) (ex.: GitHub Pages). Em file:// não faz nada. */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
